name: Build TriKota APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Buildozer and dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython==0.29.37 kivy==2.3.0

    - name: Initialize Buildozer
      run: buildozer init

    - name: Configure buildozer.spec
      run: |
        sed -i 's/title = .*/title = Три Кота Аэрохоккей/' buildozer.spec
        sed -i 's/package.name = .*/package.name = trikotahockey/' buildozer.spec
        sed -i 's/source.include_exts = .*/source.include_exts = py,png,jpg,kv,atlas,wav,mp3,json/' buildozer.spec
        sed -i 's/requirements = .*/requirements = python3,kivy==2.3.0/' buildozer.spec
        sed -i 's/orientation = .*/orientation = landscape/' buildozer.spec
        sed -i 's/fullscreen = .*/fullscreen = 1/' buildozer.spec
        echo "android.accept_sdk_license = True" >> buildozer.spec

    - name: Download Android SDK (to create sdkmanager)
      run: buildozer android update --sdk # это скачает SDK без полной сборки

    - name: Accept all Android SDK licenses
      run: |
        # Теперь sdkmanager уже существует
        yes | \~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager --licenses || true
        yes | \~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true

    - name: Build APK
      run: buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: trikota-apk
        path: bin/*.apk
