name: Build TriKota APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python + Java
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
      # Java 17 нужен для Android SDK
    - uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Buildozer
      run: |
        pip install --upgrade pip
        pip install buildozer cython==0.29.37 kivy==2.3.0

    - name: Initialize Buildozer + force SDK download
      run: |
        buildozer init
        # Основные настройки
        sed -i 's/title = .*/title = Три Кота Аэрохоккей/' buildozer.spec
        sed -i 's/package.name = .*/package.name = trikotahockey/' buildozer.spec
        sed -i 's/source.include_exts = .*/source.include_exts = py,png,jpg,kv,atlas,wav,mp3,json/' buildozer.spec
        sed -i 's/requirements = .*/requirements = python3,kivy==2.3.0/' buildozer.spec
        sed -i 's/orientation = .*/orientation = landscape/' buildozer.spec
        echo "android.accept_sdk_license = True" >> buildozer.spec
        echo "android.sdk_components = platform-tools,platforms;android-34,build-tools;34.0.0" >> buildozer.spec

    - name: Force download and setup Android SDK + accept licenses
      run: |
        buildozer android update
        # Принудительно принимаем все лицензии
        yes | \~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true
        yes | \~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager --licenses || true

    - name: Build APK
      run: buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: trikota-apk
        path: bin/*.apk
