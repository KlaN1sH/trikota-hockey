name: Build TriKota APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Buildozer
      run: |
        pip install --upgrade pip
        pip install buildozer cython==0.29.37 kivy==2.3.0

    - name: Setup Android SDK
      run: |
        # Создаем структуру каталогов для Android SDK
        mkdir -p ~/.android
        mkdir -p ~/.buildozer/android/platform/android-sdk
        
        # Устанавливаем cmdline-tools
        cd ~/.buildozer/android/platform/android-sdk
        wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-11076708_latest.zip
        mkdir -p cmdline-tools
        mv cmdline-tools cmdline-tools/latest || true
        mv latest cmdline-tools/ || true
        
        # Устанавливаем путь
        export ANDROID_SDK_ROOT=~/.buildozer/android/platform/android-sdk
        export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH
        
        # Создаем файл для автоматического принятия лицензий
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        
        # Принимаем все лицензии
        yes | sdkmanager --licenses || true
        
        # Устанавливаем только нужные версии
        yes | sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
        
        # Удаляем старые версии build-tools если есть
        rm -rf $ANDROID_SDK_ROOT/build-tools/37.* || true

    - name: Configure Buildozer
      run: |
        # Создаем buildozer.spec если его нет
        if [ ! -f buildozer.spec ]; then
          buildozer init
        fi
        
        # Правильная настройка spec файла
        sed -i 's/^title = .*/title = Три Кота Аэрохоккей/' buildozer.spec
        sed -i 's/^package.name = .*/package.name = trikotahockey/' buildozer.spec
        sed -i 's/^package.domain = .*/package.domain = org.test/' buildozer.spec
        sed -i 's/^source.include_exts = .*/source.include_exts = py,png,jpg,kv,atlas,wav,mp3,json/' buildozer.spec
        sed -i 's/^requirements = .*/requirements = python3,kivy==2.3.0/' buildozer.spec
        sed -i 's/^orientation = .*/orientation = landscape/' buildozer.spec
        sed -i 's/^android.minapi = .*/android.minapi = 21/' buildozer.spec
        sed -i 's/^android.sdk = .*/android.sdk = 34/' buildozer.spec
        sed -i 's/^android.ndk = .*/android.ndk = 23.1.7779620/' buildozer.spec
        sed -i 's/^android.accept_sdk_license = .*/android.accept_sdk_license = True/' buildozer.spec
        
        # Явно указываем версию build_tools
        echo "android.build_tools = 34.0.0" >> buildozer.spec
        
        # Указываем путь к SDK
        echo "android.sdk_path = ~/.buildozer/android/platform/android-sdk" >> buildozer.spec

    - name: Build APK
      run: |
        export ANDROID_SDK_ROOT=~/.buildozer/android/platform/android-sdk
        export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH
        buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: trikota-apk
        path: bin/*.apk
